name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Audit server dependencies
        working-directory: server
        run: npm audit --audit-level=high

  migrate:
    name: Migration smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: job_tracker
          POSTGRES_USER: job_tracker
          POSTGRES_PASSWORD: job_tracker_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install server deps
        working-directory: server
        run: npm install
      - name: Run migrations
        working-directory: server
        env:
          DATABASE_URL: postgres://job_tracker:job_tracker_dev@localhost:5432/job_tracker
          NODE_ENV: test
        run: npm run migrate
      - name: Run seed
        working-directory: server
        env:
          DATABASE_URL: postgres://job_tracker:job_tracker_dev@localhost:5432/job_tracker
          NODE_ENV: test
        run: npm run seed
